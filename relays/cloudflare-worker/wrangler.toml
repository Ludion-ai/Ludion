# ludion fallback relay — canonical Cloudflare Worker.
# Deploy is the OPERATOR'S GATE. Bootstrap:
#   npx wrangler secret put PROVIDER_API_KEY    # the real provider key, server-side only
#   npx wrangler secret put RELAY_TOKEN         # REQUIRED by default (the auth boundary)
#   # set UPSTREAM_BASE_URL + ALLOWED_ORIGINS below, then:
#   npx wrangler deploy

name = "ludion-fallback-relay"
main = "src/index.ts"
compatibility_date = "2026-05-03"

[vars]
# OpenAI-compatible upstream. "/chat/completions" is appended by the relay.
# PASTE-POINT: e.g. "https://api.openai.com/v1".
UPSTREAM_BASE_URL = "https://api.openai.com/v1"

# Browser origins allowed to call this relay (comma-separated, no trailing slash).
# Defense-in-depth ONLY — CORS does not stop a non-browser caller. The auth
# boundary is RELAY_TOKEN, not this list. Do NOT use "*".
# PASTE-POINT: replace with your app origin(s). Local dev overrides live in
# .dev.vars (gitignored).
ALLOWED_ORIGINS = "https://your-app.example"

# DANGER opt-out. Uncommenting this disables the token gate and leaves an OPEN
# PROXY to your provider key for anyone who learns the URL. Only for setups with
# their own auth in front of the relay. Leave commented for the safe default.
# RELAY_OPEN = "true"

# Secrets (never put these here):
#   PROVIDER_API_KEY  the provider key, injected upstream:
#                       npx wrangler secret put PROVIDER_API_KEY
#   RELAY_TOKEN       REQUIRED by default; the browser must send
#                       Authorization: Bearer <RELAY_TOKEN>. Low-value, rotatable
#                       gate token, NOT the provider key:
#                       npx wrangler secret put RELAY_TOKEN

# RATE LIMIT — ON BY DEFAULT (safety cap). The native Workers rate-limiting
# binding needs no resource creation, so shipping it enabled keeps a one-step
# deploy: the relay counts per client IP (CF-Connecting-IP) and returns 429 over
# the cap. The token gate alone is NOT abuse control — a leaked token lets one IP
# drain the budget; this per-IP cap is the abuse layer.
#
# limit=60 / period=60 = 60 requests per IP per minute is a deliberately safe
# default — TUNE it to your expected traffic. Note: limiting is approximate and
# per-colo, and `period` accepts only 10 or 60 (seconds).
#
# ESCAPE HATCH (do not leave it silently broken): if `wrangler deploy` REJECTS
# this block (binding syntax varies by wrangler version), either update the
# syntax per your wrangler version's docs to keep the cap, OR explicitly comment
# this block out — which is a DELIBERATE choice to run with no rate limit, not an
# accident. Failing loudly at deploy is intended.
[[ratelimits]]
binding = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 60, period = 60 }
