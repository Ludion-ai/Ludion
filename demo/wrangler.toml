# ludion-demo — Cloudflare Pages config (TEMPLATE). The Pages project serves the
# built static site (dist/) and the same-origin Functions in functions/.
# Deploy + binding + secrets are the OPERATOR'S GATE (see workspace/README.md).
#
# Pages secrets Lattice must set (never commit these):
#   GITHUB_CLIENT_ID       GitHub OAuth app client id
#   GITHUB_CLIENT_SECRET   GitHub OAuth app client secret
#   SESSION_SECRET         long random string that signs the session cookie
# Set each with:  npx wrangler pages secret put <NAME>

name = "ludion-demo"
pages_build_output_dir = "dist"
compatibility_date = "2026-05-03"

# Per-user, non-secret config store for the /api/config Functions.
[[kv_namespaces]]
binding = "WORKSPACE_KV"
# PASTE-POINT: replace with the id from `wrangler kv namespace create WORKSPACE_KV`.
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Anonymous demo-execution instrumentation sink for functions/api/track.ts.
# The dataset is created in the Cloudflare dashboard (OPERATOR'S GATE) — no id is
# needed here; binding + dataset name are enough once the dataset exists.
# Records only: event / device_class / browser / reason / in-memory session_id.
# No PII, no IP, no prompt or output text (see functions/api/track.ts).
[[analytics_engine_datasets]]
binding = "DEMO_EVENTS"
dataset = "ludion_demo_events"
